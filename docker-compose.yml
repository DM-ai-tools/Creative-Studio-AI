version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: creativestudio_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-creativestudio}
      POSTGRES_USER: ${POSTGRES_USER:-csuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cspassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-csuser} -d ${POSTGRES_DB:-creativestudio}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: creativestudio_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: creativestudio_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-csuser}:${POSTGRES_PASSWORD:-cspassword}@db:5432/${POSTGRES_DB:-creativestudio}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379/0
    volumes:
      - ./backend/uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: creativestudio_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
